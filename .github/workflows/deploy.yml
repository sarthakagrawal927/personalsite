name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy-production:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: pnpm }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm cf:build
      - name: Prepare Pages deploy directory
        run: |
          mkdir -p .pages-deploy
          cp -r .open-next/assets/. .pages-deploy/
          cp -r .open-next/cloudflare .pages-deploy/
          cp -r .open-next/middleware .pages-deploy/
          cp -r .open-next/.build .pages-deploy/
          cp -r .open-next/server-functions .pages-deploy/
          cp .open-next/worker.js .pages-deploy/_worker.js
      - uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_ACCOUNT_ID: 7d048325699a5acddb44d3be31cf6ba9
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: pages deploy .pages-deploy --project-name=personalsite --branch=main

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: pnpm }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm cf:build
      - name: Prepare Pages deploy directory
        run: |
          mkdir -p .pages-deploy
          cp -r .open-next/assets/. .pages-deploy/
          cp -r .open-next/cloudflare .pages-deploy/
          cp -r .open-next/middleware .pages-deploy/
          cp -r .open-next/.build .pages-deploy/
          cp -r .open-next/server-functions .pages-deploy/
          cp .open-next/worker.js .pages-deploy/_worker.js
      - name: Deploy preview
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_ACCOUNT_ID: 7d048325699a5acddb44d3be31cf6ba9
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: pages deploy .pages-deploy --project-name=personalsite --branch=${{ github.head_ref || github.ref_name }}
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed to Cloudflare Pages: https://${{ github.head_ref || github.ref_name }}.personalsite-aeu.pages.dev`
            })
